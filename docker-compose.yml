services:
  postgres:
    image: postgres:16-alpine
    container_name: bolsines_db
    environment:
      POSTGRES_DB: ${DB_NAME:-bolsines}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
